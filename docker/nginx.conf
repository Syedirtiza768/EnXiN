# ==================================================================
# EnXi ERP — Nginx Reverse Proxy Configuration
# ==================================================================

upstream backend-server {
    server backend:8000 fail_timeout=0;
}

upstream socketio-server {
    server websocket:9000 fail_timeout=0;
}

server {
    listen 80;
    server_name _;

    root /home/frappe/frappe-bench/sites;

    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    client_max_body_size    50m;
    client_body_buffer_size 16k;

    add_header X-Frame-Options         "SAMEORIGIN";
    add_header X-Content-Type-Options  "nosniff";

    # ----- Built static assets (JS / CSS) -----
    location /assets {
        try_files $uri =404;
        add_header Cache-Control "max-age=31536000";
    }

    # ----- Uploaded public files -----
    location ~ ^/files/ {
        try_files /$host/public/$uri @backend;
        add_header Cache-Control "max-age=3600";
    }

    # ----- Socket.IO  (WebSocket upgrade) -----
    location /socket.io {
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   X-Frappe-Site-Name $host;
        proxy_set_header   Origin            $scheme://$http_host;
        proxy_set_header   Host              $host;
        proxy_pass         http://socketio-server;
    }

    # ----- Backend X-Accel-Redirect for private files -----
    location /protected {
        internal;
        try_files /$uri =404;
    }

    # ----- All other requests → Gunicorn -----
    location / {
        rewrite ^(.+)/$ $1 permanent;
        rewrite ^(.+)/index\.html$ $1 permanent;
        rewrite ^(.+)\.html$ $1 permanent;

        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Frappe-Site-Name $host;
        proxy_set_header Host               $host;
        proxy_set_header X-Use-X-Accel-Redirect True;
        proxy_read_timeout 120;
        proxy_redirect     off;

        proxy_pass http://backend-server;
    }

    # ----- Named fallback for try_files -----
    location @backend {
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Frappe-Site-Name $host;
        proxy_set_header Host               $host;
        proxy_set_header X-Use-X-Accel-Redirect True;
        proxy_read_timeout 120;
        proxy_redirect     off;

        proxy_pass http://backend-server;
    }
}
